num_gaussians: 50000
data_source_path: "data/synthetic_dataset/cone_ntrain_50_angle_360/1_pepper_cone" # path to the data (r2 style)
model_path: "models/recon/1_pepper_cone" # path to save/load the model checkpoints
init_mode: 'gradient' # precomputed or gradient or intensity or prior
prior_path: "" # Set path to specific point cloud if "prior" mode used for initialization.
density_thresh: 0.05 # volume density (voxel intensity) for filtering out background in initialization
density_rescale: 0.15 # Empirical density rescaling to factor in gaussian occlusions (many gaussians contributing to a voxel)
scale_min: 0.0005 # Percent of volume size
scale_max: 0.5 # Percent of volume size
eval: True